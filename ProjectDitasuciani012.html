<!DOCTYPE html>
<html>
<head>
    <title>Kalkulator Sederhana</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:50px;
            background:#f4f4f4;
        }
        .kalkulator{
            background:white;
            padding:20px;
            width:250px;
            margin:auto;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }
        input{
            width:100%;
            height:40px;
            font-size:20px;
            margin-bottom:10px;
            text-align:right;
        }
        button{
            width:55px;
            height:40px;
            font-size:18px;
            margin:2px;
        }
    </style>
</head>

<body>

<div class="kalkulator">
    <h3>Kalkulator</h3>
    <input type="text" id="layar" readonly>

    <br>
    <button onclick="tambah('7')">7</button>
    <button onclick="tambah('8')">8</button>
    <button onclick="tambah('9')">9</button>
    <button onclick="tambah('/')">÷</button><br>

    <button onclick="tambah('4')">4</button>
    <button onclick="tambah('5')">5</button>
    <button onclick="tambah('6')">6</button>
    <button onclick="tambah('*')">×</button><br>

    <button onclick="tambah('1')">1</button>
    <button onclick="tambah('2')">2</button>
    <button onclick="tambah('3')">3</button>
    <button onclick="tambah('-')">−</button><br>

    <button onclick="tambah('0')">0</button>
    <button onclick="tambah('.')">.</button>
    <button onclick="hitung()">=</button>
    <button onclick="tambah('+')">+</button><br>

    <button onclick="hapus()">C</button>
    <button onclick="hapusSatu()">"DEL"</button> 
//tambah del

</div>

<script>
    function tambah(nilai){
        document.getElementById("layar").value += nilai;
    }

    function hapus(){
        document.getElementById("layar").value = "";
    }

    function hapusSatu(){
        let layar = document.getElementById("layar").value;
        document.getElementById("layar").value = layar.slice(0,-1);
    }

    function hitung(){
        try{
            document.getElementById("layar").value = eval(document.getElementById("layar").value);
        }catch{
            alert("Input salah");
        }
    }
</script>

</body>
</html>
